<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1366b4" />
    <title>Native Sun Homes — Manufactured & Modular Homes in Florida</title>
    <meta
      name="description"
      content="Native Sun Homes LLC sells new manufactured & modular homes across Florida, in partnership with Champion Homes. Browse 270+ models, compare floor plans, take 3D tours, and get honest pricing and financing help."
    />
    <link rel="canonical" href="https://nativesun.homes/" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Native Sun Homes LLC" />
    <meta property="og:title" content="Native Sun Homes — Manufactured & Modular Homes in Florida" />
    <meta property="og:description" content="New manufactured & modular homes across Florida, in partnership with Champion Homes. Browse models, floor plans, and 3D tours." />
    <meta property="og:url" content="https://nativesun.homes/" />
    <meta property="og:image" content="https://nativesun.homes/images/Logo.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Structured data: local business (for search + AI answer engines) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HomeAndConstructionBusiness",
        "@id": "https://nativesun.homes/#business",
        "name": "Native Sun Homes LLC",
        "alternateName": "Native Sun Homes",
        "description": "Dealer of new manufactured and modular homes serving all of Florida, in partnership with Champion Homes. Floor plans, 3D tours, customization, financing assistance, delivery and setup.",
        "url": "https://nativesun.homes/",
        "logo": "https://nativesun.homes/images/Logo.jpg",
        "image": "https://nativesun.homes/images/Logo.jpg",
        "telephone": "+1-863-263-4736",
        "email": "contactus@nativesunhomesllc.com",
        "slogan": "Bringing your home straight to you",
        "priceRange": "$$",
        "areaServed": { "@type": "State", "name": "Florida" },
        "address": { "@type": "PostalAddress", "addressRegion": "FL", "addressCountry": "US" },
        "sameAs": ["https://www.facebook.com/NativeSunHomes"]
      }
    </script>
  </head>
  <body>
    <!-- Netlify Forms detection form (hidden). The React form posts to this. -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="model" />
      <input type="text" name="interest" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <noscript>
      <h1>Native Sun Homes LLC — Manufactured &amp; Modular Homes in Florida</h1>
      <p>
        Native Sun Homes LLC sells new manufactured and modular homes across all
        of Florida, in partnership with Champion Homes. We offer 270+ models with
        floor plans, photo galleries, and 3D virtual tours, plus customization,
        financing assistance, delivery and setup.
      </p>
      <p>
        Call <a href="tel:+18632634736">(863) 263-4736</a> or email
        <a href="mailto:contactus@nativesunhomesllc.com">contactus@nativesunhomesllc.com</a>.
        Bringing your home straight to you.
      </p>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
