<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Native Sun Homes">
  <defs>
    <linearGradient id="nshSun" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef7a1a" />
      <stop offset="0.55" stop-color="#f6991f" />
      <stop offset="1" stop-color="#fbbf3a" />
    </linearGradient>
  </defs>
  <!-- sun rays bursting from the roof peak -->
  <g stroke="url(#nshSun)" stroke-width="4" stroke-linecap="round">
    <line x1="32" y1="27" x2="32" y2="6" />
    <line x1="32" y1="27" x2="19" y2="11" />
    <line x1="32" y1="27" x2="45" y2="11" />
    <line x1="32" y1="27" x2="9" y2="19" />
    <line x1="32" y1="27" x2="55" y2="19" />
  </g>
  <!-- roof swoosh wings -->
  <path d="M21 35 C 14.5 35.5, 9.5 38, 5 41" fill="none" stroke="url(#nshSun)" stroke-width="4.5" stroke-linecap="round" />
  <path d="M43 35 C 49.5 35.5, 54.5 38, 59 41" fill="none" stroke="url(#nshSun)" stroke-width="4.5" stroke-linecap="round" />
  <!-- house roof peak -->
  <path d="M21 35 L32 26 L43 35" fill="none" stroke="url(#nshSun)" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round" />
  <!-- window -->
  <g fill="#11367f">
    <rect x="29.2" y="30" width="2.5" height="2.5" rx="0.4" />
    <rect x="32.3" y="30" width="2.5" height="2.5" rx="0.4" />
    <rect x="29.2" y="33.1" width="2.5" height="2.5" rx="0.4" />
    <rect x="32.3" y="33.1" width="2.5" height="2.5" rx="0.4" />
  </g>
</svg>
