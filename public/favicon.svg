<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Native Sun Homes">
  <defs>
    <linearGradient id="nshSun" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef7a1a" />
      <stop offset="0.55" stop-color="#f6991f" />
      <stop offset="1" stop-color="#fbbf3a" />
    </linearGradient>
  </defs>
  <!-- sun rays bursting from the roof peak -->
  <g stroke="url(#nshSun)" stroke-width="6" stroke-linecap="round">
    <line x1="32" y1="27" x2="32" y2="5" />
    <line x1="32" y1="27" x2="18" y2="10" />
    <line x1="32" y1="27" x2="46" y2="10" />
    <line x1="32" y1="27" x2="8" y2="19" />
    <line x1="32" y1="27" x2="56" y2="19" />
  </g>
  <!-- roof swoosh wings -->
  <path d="M20 36 C 13.5 36.5, 8.5 39, 4 42" fill="none" stroke="url(#nshSun)" stroke-width="6.5" stroke-linecap="round" />
  <path d="M44 36 C 50.5 36.5, 55.5 39, 60 42" fill="none" stroke="url(#nshSun)" stroke-width="6.5" stroke-linecap="round" />
  <!-- house roof peak -->
  <path d="M20 36 L32 25 L44 36" fill="none" stroke="url(#nshSun)" stroke-width="6.5" stroke-linejoin="round" stroke-linecap="round" />
  <!-- window -->
  <g fill="#11367f">
    <rect x="28.4" y="30" width="3.2" height="3.2" rx="0.5" />
    <rect x="32.4" y="30" width="3.2" height="3.2" rx="0.5" />
    <rect x="28.4" y="34" width="3.2" height="3.2" rx="0.5" />
    <rect x="32.4" y="34" width="3.2" height="3.2" rx="0.5" />
  </g>
</svg>
